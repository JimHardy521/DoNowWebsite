<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GCSE Maths: Higher - A 10 Mark Do Now</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background-color: #f0f4f8;
  color: #333;
}

h1 {
  text-align: center;
  margin: 30px 0 15px;
  font-size: 2rem;
  color: #1f3c88;
}

.button-bar {
  text-align: center;
  margin-bottom: 20px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  background-color: #1f3c88;
  color: white;
  cursor: pointer;
  margin: 0 8px;
}

button:hover {
  background-color: #3757b2;
}

#questions {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  font-size: 24px;
  gap: 25px;
  max-width: 1200px;
  margin: auto;
}

.question-box {
  background: white;
  border-radius: 12px;
  padding: 25px 20px;
  min-height: 280px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  position: relative;
  cursor: pointer;
  text-align: center;
}

.question-header {
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 15px;
}

.solution {
  display: none;
  margin-top: 15px;
  color: #006400;
}

.marks {
  position: absolute;
  bottom: 10px;
  right: 15px;
  font-weight: 700;
}

.refresh-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #e0e7ff;
  color: #1f3c88;
  font-size: 16px;
  line-height: 28px;
  text-align: center;
  cursor: pointer;
}

.refresh-btn:hover {
  background: #1f3c88;
  color: white;
}

hr {
  margin: 40px auto 20px;
  max-width: 1000px;
  border: none;
  border-top: 2px solid #ccc;
}

.topic-toolbar {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 15px;
  max-width: 1200px;
  margin: 20px auto;
  background: #e3eaf4;
  padding: 15px;
  border-radius: 12px;
}

.topic-wrapper {
  text-align: center;
}

.topic-wrapper label {
  display: block;
  font-weight: 600;
  margin-bottom: 5px;
}

.topic-wrapper select {
  padding: 6px 10px;
  border-radius: 6px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script src="questions1.js"></script>
<script src="questions2.js"></script>
<script src="questions3.js"></script>
<script src="questions4.js"></script>
</head>

<body>

<h1>GCSE Maths: Higher – A 10 Mark Do Now</h1>

<div class="button-bar">
  <button onclick="loadQuestions()">New Questions</button>
  <button onclick="printQuestions()">Print Questions</button>
</div>

<div id="questions"></div>

<hr>

<p style="text-align:center;font-weight:700;">... or create a Do Now using specific topics:</p>

<div class="topic-toolbar">
  <div class="topic-wrapper"><label>Question 1 Topic</label><select id="topic1"></select></div>
  <div class="topic-wrapper"><label>Question 2 Topic</label><select id="topic2"></select></div>
  <div class="topic-wrapper"><label>Question 3 Topic</label><select id="topic3"></select></div>
  <div class="topic-wrapper"><label>Question 4 Topic</label><select id="topic4"></select></div>
  <div class="topic-wrapper"><button onclick="loadTopicQuestions()">Load Topic Questions</button></div>
</div>

<script>
// Populate topic drop-downs dynamically from JS files
function populateTopics(selectId, questionSet) {
  const sel = document.getElementById(selectId);
  const topics = [...new Set(questionSet.map(q => q.topic))];
  topics.forEach(t=>{
    const o = document.createElement("option");
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
}

populateTopics("topic1", questions1);
populateTopics("topic2", questions2);
populateTopics("topic3", questions3);
populateTopics("topic4", questions4);

function randomFrom(arr){return arr[Math.floor(Math.random()*arr.length)];}

function createBox(q,marks,index){
 const box=document.createElement("div");
 box.className="question-box";

 const h=document.createElement("div");
 h.className="question-header";
 h.innerHTML=`Question ${index+1}: ${q.topic}`;
 box.appendChild(h);

 const qt=document.createElement("div");
 qt.innerHTML=q.question;
 box.appendChild(qt);

 const sol=document.createElement("div");
 sol.className="solution";
 sol.innerHTML=`<strong>Solution:</strong> ${q.solution}`;
 box.appendChild(sol);

 const m=document.createElement("div");
 m.className="marks";
 m.innerHTML=`(${marks} mark${marks>1?"s":""})`;
 box.appendChild(m);

 box.onclick=()=>sol.style.display=sol.style.display==="none"?"block":"none";

 const r=document.createElement("div");
 r.className="refresh-btn";
 r.innerHTML="↻";
 r.onclick=e=>{
   e.stopPropagation();
   const all=[questions1,questions2,questions3,questions4][index];
   let nq;
   do{ nq=randomFrom(all); } while(nq.question===q.question);
   qt.innerHTML=nq.question;
   sol.innerHTML=`<strong>Solution:</strong> ${nq.solution}`;
   h.innerHTML=`Question ${index+1}: ${nq.topic}`;
   MathJax.typeset();
 };
 box.appendChild(r);

 document.getElementById("questions").appendChild(box);
}

function loadQuestions(){
 document.getElementById("questions").innerHTML="";
 [[questions1,1],[questions2,2],[questions3,3],[questions4,4]]
 .forEach((s,i)=>createBox(randomFrom(s[0] || s),s[1],i));
 MathJax.typeset();
}

function loadTopicQuestions(){
  document.getElementById("questions").innerHTML = "";

  const sets = [
    { data: questions1, marks: 1 },
    { data: questions2, marks: 2 },
    { data: questions3, marks: 3 },
    { data: questions4, marks: 4 }
  ];

  sets.forEach((set, i) => {
    const selectedTopic = document.getElementById(`topic${i+1}`).value;

    const filtered = set.data.filter(q => q.topic === selectedTopic);

    if (filtered.length === 0) {
      console.warn(`No questions found for ${selectedTopic}`);
      return;
    }

    createBox(randomFrom(filtered), set.marks, i);
  });

  MathJax.typeset();
}

function printQuestions(){
  const boxes = document.querySelectorAll(".question-box");
  let questions=[];
  boxes.forEach(b=>{
    questions.push({
      header:b.querySelector(".question-header").innerHTML,
      question:b.children[1].innerHTML
    });
  });
  // duplicate to make 8
  questions = questions.concat(questions);

  const win = window.open("","_blank");
  let html = `
  <html>
  <head>
    <title>Print GCSE Questions</title>
    <style>
      @page{margin:5mm;size:A4;}
      body {margin:0; font-family:Inter, Arial, sans-serif;}
      .page {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 5mm;
        box-sizing: border-box;
      }
      .print-box {
        border:1px solid #000;
        padding: 8px;
        box-sizing: border-box;
        font-size: 14px;
        min-height: 200px;
      }
      .print-header {
        font-weight:700;
        margin-bottom: 4px;
      }
      .cut-line {
        border-top:2px dashed #000;
        margin:10px 0;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><\/script>
  </head>
  <body>
    <div class="page">
      ${questions.slice(0,4).map(q=>`<div class="print-box"><div class="print-header">${q.header}</div><div>${q.question}</div></div>`).join('')}
    </div>
    <div class="cut-line"></div>
    <div class="page">
      ${questions.slice(4,8).map(q=>`<div class="print-box"><div class="print-header">${q.header}</div><div>${q.question}</div></div>`).join('')}
    </div>
  </body>
  </html>
  `;
  win.document.write(html);
  win.document.close();
  win.onload=()=>win.MathJax.typesetPromise().then(()=>win.print());
}

loadQuestions();
</script>

</body>
</html>
